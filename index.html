<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feval Filtros</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0f2744;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo-icon{width:64px;height:64px;background:#c9a84c;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px}
h1{color:#c9a84c;font-family:'DM Serif Display',serif;font-size:2em;text-align:center;letter-spacing:.5px}
p{color:#8899bb;font-size:.85em;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-top:6px}
.cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:400px;margin-top:36px}
a{text-decoration:none}
.card{background:#132f55;border:2px solid #1a3f6e;border-radius:14px;padding:20px 22px;display:flex;align-items:center;gap:16px;transition:all .2s;cursor:pointer}
.card:hover{background:#1a3f6e;border-color:#c9a84c}
.card-icon{font-size:28px;min-width:40px;text-align:center}
.card-title{color:#c9a84c;font-size:1em;font-weight:700}
.card-desc{color:#8899bb;font-size:.82em;margin-top:3px}
.card-arrow{color:#c9a84c;font-size:1.4em;margin-left:auto;font-weight:bold}
.footer{color:#2a4060;font-size:.75em;margin-top:32px;text-align:center}
</style>
</head>
<body>
<div class="logo-icon">&#127981;</div>
<h1>Feval Filtros</h1>
<p>Sistema de gestion</p>
<div class="cards">
  <a href="almacen_stock.html">
    <div class="card">
      <div class="card-icon">&#128230;</div>
      <div>
        <div class="card-title">Almacen de Stock</div>
        <div class="card-desc">Control de rollos de malla</div>
      </div>
      <div class="card-arrow">&#8250;</div>
    </div>
  </a>
  <a href="factu_web.html">
    <div class="card">
      <div class="card-icon">&#129534;</div>
      <div>
        <div class="card-title">Facturas y Pedidos</div>
        <div class="card-desc">Historico FacturaPlus</div>
      </div>
      <div class="card-arrow">&#8250;</div>
    </div>
  </a>
</div>
<div class="footer">Feval Filtros &copy; Gestion interna</div>
</body>
</html>
